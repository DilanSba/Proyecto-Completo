<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="houseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1D429B"/>
      <stop offset="100%" stop-color="#21274e"/>
    </linearGradient>
  </defs>
  <!-- Fondo redondeado -->
  <rect width="32" height="32" rx="6" fill="#f0f7ff"/>

  <!-- Casa: cuerpo principal -->
  <path d="M16 4 L4 14 L7 14 L7 26 L25 26 L25 14 L28 14 Z"
        fill="url(#houseGrad)"/>

  <!-- Techo destacado (representando Roofing) -->
  <path d="M16 4 L4 14 L28 14 Z"
        fill="#F89B24"
        stroke="#F89B24"
        stroke-width="0.5"/>

  <!-- Panel solar pequeño en el techo izq -->
  <rect x="9" y="11" width="5" height="2.2" fill="#1D429B" rx="0.3"/>

  <!-- Puerta -->
  <rect x="14" y="19" width="4" height="7" fill="#F89B24"/>

  <!-- Ventana derecha -->
  <rect x="19" y="17" width="3" height="3" fill="#A6C3E6" rx="0.4"/>

  <!-- Ventana izquierda -->
  <rect x="10" y="17" width="3" height="3" fill="#A6C3E6" rx="0.4"/>

  <!-- Rayo eléctrico pequeño (batería/solar) -->
  <path d="M22 20 L20.5 22.5 H22 L21.5 25 L23.5 22 H22.2 L22.7 20 Z"
        fill="#F89B24" opacity="0.9"/>
</svg>
